name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check Python version
        run: | 
          python_version=$(python --version)
          correct_version="Python 3.11.15"
          if [[ ${python_version} != ${correct_version} ]]; then
              echo "Python version is not 3.11.15"
              exit 1
          fi
      
      - name: Install dependencies
        run: pip install pytest flake8
      
      - name: Lint
        run: flake8 src/ tests/

      - name: Run tests
        run: pytest tests/ -v 